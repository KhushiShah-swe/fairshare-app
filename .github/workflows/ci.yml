name: FairShare CI Build

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------- BACKEND ----------------
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run backend tests and coverage check
        working-directory: ./backend/fairshare-backend
        run: mvn clean verify

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/fairshare-backend/target/site/jacoco

      - name: Upload Surefire test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-report
          path: backend/fairshare-backend/target/surefire-reports

      # ---------------- FRONTEND ----------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: ./frontend/fairshare-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend/fairshare-frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: ./frontend/fairshare-frontend
        run: npx vitest run
