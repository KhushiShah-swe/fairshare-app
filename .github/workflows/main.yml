name: FairShare CI Build

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # 1. Backend Automated Build & Test (Maven)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Backend Tests
        # This will pass since your logic errors were fixed
        run: mvn test
        working-directory: ./backend/fairshare-backend

      # 2. Frontend Automated Build & Test (Vite/Vitest)
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Frontend Deps
        run: npm install
        working-directory: ./frontend/fairshare-frontend

      - name: Run Frontend Tests
        # FIX: Explicitly set permissions and use the direct path to the vitest binary
        # to prevent the 'Exit code 127' permission error
        run: |
          chmod +x ./node_modules/.bin/vitest
          ./node_modules/.bin/vitest run
        working-directory: ./frontend/fairshare-frontend
