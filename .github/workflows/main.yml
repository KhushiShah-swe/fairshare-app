name: FairShare CI Build

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # Backend Tests (Maven)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run Backend Tests
        run: mvn test
        working-directory: ./backend/fairshare-backend

     # Frontend Automated Build & Test
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Frontend Deps
        run: npm install
        working-directory: ./frontend/fairshare-frontend

      - name: Run Frontend Tests
        # FIX: Added 'npx' to execute vitest from node_modules correctly
        # This bypasses the "Permission denied" error seen in image_af1e60.png
        run: npx vitest run
        working-directory: ./frontend/fairshare-frontend
