name: FairShare CI Build

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # Backend Tests (Maven)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run Backend Tests
        run: mvn test
        working-directory: ./backend/fairshare-backend

      # Frontend Tests (Vite/Vitest)
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install Frontend Deps
        run: npm install
        working-directory: ./frontend/fairshare-frontend
      - name: Run Frontend Tests
        run: npm test
        working-directory: ./frontend/fairshare-frontend