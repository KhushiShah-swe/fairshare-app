<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FairShare - Create Account</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@100;200;300;400;500;600;700;800;900&family=Geist:wght@100;200;300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@100;200;300;400;500;600;700&family=IBM+Plex+Sans:wght@100;200;300;400;500;600;700&family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Nunito:wght@200;300;400;500;600;700;800;900&family=PT+Serif:wght@400;700&family=Roboto+Slab:wght@100;200;300;400;500;600;700;800;900&family=Roboto:wght@100;300;400;500;700;900&family=Shantell+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  
  <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
  
  <style>
    :root {
      --font-family-body: 'Inter', sans-serif; 
      --background: #f8f9fa;
      --foreground: #1e293b;
      --card: #ffffff;
      --card-border: #e2e8f0;
      --primary: #10b981;
      --primary-hover: #059669;
      --primary-foreground: #ffffff;
      --secondary-foreground: #475569;
      --muted-foreground: #94a3b8;
      --border: #e2e8f0;
      --radius-xl: 16px;
      --radius-lg: 12px;
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font-family-body);
      background-color: var(--background);
      color: var(--foreground);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .signup-card {
      width: 100%;
      max-width: 440px;
      background: var(--card);
      border-radius: var(--radius-xl);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow-md);
      padding: 40px;
    }

    .logo-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
      text-align: center;
    }

    .logo-mark {
      width: 48px;
      height: 48px;
      background-color: var(--primary);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .app-name { font-size: 24px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
    .app-subtitle { font-size: 15px; color: var(--secondary-foreground); margin-top: 8px; }

    .form-group { margin-bottom: 18px; }
    .label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; }

    .input-wrapper { position: relative; display: flex; align-items: center; }
    .input-field {
      width: 100%;
      padding: 12px 16px;
      font-size: 15px;
      font-family: var(--font-family-body);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      outline: none;
      transition: border-color 0.2s;
    }
    .input-field:focus { border-color: var(--primary); }

    .btn {
      width: 100%;
      padding: 12px;
      border-radius: var(--radius-lg);
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font-family-body);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: none;
      transition: 0.2s;
    }

    .btn-primary { background-color: var(--primary); color: white; margin-top: 8px; }
    .btn-primary:hover { background-color: var(--primary-hover); }

    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: var(--muted-foreground);
      font-size: 13px;
    }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background-color: var(--border); }
    .divider span { padding: 0 10px; }

    .btn-outline { background-color: white; border: 1px solid var(--border); }
    .btn-outline:hover { background-color: #f8fafc; }

    .footer-link { text-align: center; margin-top: 24px; font-size: 14px; }
    .footer-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
    
    .error-text { color: #ef4444; font-size: 12px; margin-top: 4px; display: none; }
  </style>
</head>
<body>

  <div class="signup-card">
    <div class="logo-header">
      <div class="logo-mark">
        <iconify-icon icon="lucide:split" style="font-size: 28px; color: white"></iconify-icon>
      </div>
      <h1 class="app-name">Join FairShare</h1>
      <p class="app-subtitle">Start splitting bills fairly today</p>
    </div>

    <form id="signupForm">
      <div class="form-group">
        <label class="label">Full Name</label>
        <input type="text" id="fullname" class="input-field" placeholder="John Doe" required>
      </div>

      <div class="form-group">
        <label class="label">Email address</label>
        <input type="email" id="email" class="input-field" placeholder="name@example.com" required>
      </div>

      <div class="form-group">
        <label class="label">Password</label>
        <input type="password" id="password" class="input-field" placeholder="Create a password" required minlength="6">
      </div>

      <div class="form-group">
        <label class="label">Confirm Password</label>
        <input type="password" id="confirmPassword" class="input-field" placeholder="Repeat password" required>
        <span id="passwordError" class="error-text">Passwords do not match</span>
      </div>

      <button type="submit" class="btn btn-primary" id="signupBtn">Create Account</button>
    </form>

    <div class="divider"><span>or sign up with</span></div>

    <button class="btn btn-outline" type="button" onclick="alert('Google Sign Up')">
      <iconify-icon icon="lucide:chrome" style="font-size: 20px"></iconify-icon>
      Google
    </button>

    <div class="footer-link">
      Already have an account? <a href="login.html">Log in</a>
    </div>
  </div>

  <script>
    const signupForm = document.getElementById('signupForm');
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirmPassword');
    const passwordError = document.getElementById('passwordError');
    const signupBtn = document.getElementById('signupBtn');

    signupForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      // Basic Password Match Check
      if (password.value !== confirmPassword.value) {
        passwordError.style.display = 'block';
        confirmPassword.style.borderColor = '#ef4444';
        return;
      }

      passwordError.style.display = 'none';
      confirmPassword.style.borderColor = 'var(--border)';
      
      // Loading State
      signupBtn.disabled = true;
      signupBtn.innerText = "Creating Account...";
      
      setTimeout(() => {
        alert("Account created successfully! Please log in.");
        signupBtn.innerText = "Create Account";
        signupBtn.disabled = false;
        // In a real app: window.location.href = "login.html";
      }, 1500);
    });
  </script>
</body>
</html>
